server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers for Standalone POS
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Root redirect to SPA at /app/
    location = / {
        return 302 /app/;
    }
    location = /app {
        return 302 /app/;
    }
    # Logout / စာမျက်နှာ ပြန်ဝင်ချိန် /login သို့ ရောက်ရင် SPA အောက်က /app/login သို့ ညွှန်းမယ် (404 မဖြစ်အောင်)
    location = /login {
        return 302 /app/login;
    }
    location = /register {
        return 302 /app/register;
    }

    # Assets under /app/assets/ – serve real files only (never fallback to HTML; avoids MIME type error)
    location /app/assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Manifest – serve from frontend static (no backend dependency; avoids 502 when backend is starting)
    location = /app/manifest.json {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header Content-Type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # index.html: no-cache so deployments always get fresh assets
    location = /app/index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    # Vue SPA at /app/ (Vite base: /app/) – SPA fallback for client-side routes
    location /app/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /app/index.html;
        index index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy API to backend
    # Frontend uses services/api.js with baseURL: '/api/'
    # So requests come as /api/token/, /api/core/me/, etc.
    # Backend expects /api/token/, /api/core/me/, etc. (all URLs start with /api/)
    # When proxy_pass doesn't end with /, nginx passes the full path including /api/
    # So /api/token/ -> http://backend:8000/api/token/ ✅
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # No cache for API
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # WebSocket for Django Channels
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        
        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media files (if served through nginx)
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Static files (if served through nginx)
    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression for premium performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Do NOT use error_page 404 → index.html globally: it would serve HTML for /app/assets/*.js
    # and cause "Expected JavaScript but got text/html" MIME type errors.
    error_page 500 502 503 504 /app/index.html;
}
